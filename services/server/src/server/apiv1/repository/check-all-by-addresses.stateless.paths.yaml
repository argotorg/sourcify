openapi: "3.0.0"

paths:
  /check-all-by-addresses:
    get:
      deprecated: true
      summary: Check if contracts are verified (full or partial match) by addresses and chain IDs
      description: Checks if contract with the desired chain and address is verified and in the repository. It will search for both perfect and partial matches.
      tags:
        - (Deprecated) Repository
      parameters:
        - name: addresses
          in: query
          description: Comma seperated string of addresses to check for.
          required: true
          schema:
            type: string
            format: comma-separated-addresses
        - name: chainIds
          in: query
          description: Comma separated string of chain IDs.
          required: true
          schema:
            type: string
            format: comma-separated-sourcify-chainIds
          allowReserved: true
        - name: resolveProxies
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: Check if the contracts are proxies and what their implementations are.
      responses:
        "200":
          description: OK. Also returns `200` with status `false` when not found
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    address:
                      type: string
                    status:
                      type: string
                      description: Set to "false" when the contract is not found on any of the requested chains.
                    warning:
                      type: string
                      description: Deprecation warning. This endpoint will be removed. Use the v2 API instead.
                    chainIds:
                      type: array
                      items:
                        type: object
                        properties:
                          chainId:
                            type: string
                          status:
                            type: string
                          isProxy:
                            type: boolean
                          proxyType:
                            type: string
                          implementations:
                            type: array
                            items:
                              type: object
                              properties:
                                address:
                                  type: string
                                name:
                                  type: string
                          proxyResolutionError:
                            type: string
                          warning:
                            type: string
                            description: Deprecation warning. This endpoint will be removed. Use the v2 API instead.
              examples:
                multiple results:
                  value:
                    - address: "0x6F1D75a53a8805DcA5347aE5F3eDE035CAE3CBC1"
                      chainIds:
                        - chainId: "5"
                          status: "perfect"
                          isProxy: false
                          proxyType: null
                          implementations: []
                        - chainId: "10"
                          status: "partial"
                          isProxy: false
                          proxyType: null
                          implementations: []
                        - chainId: "11155111"
                          status: "perfect"
                          isProxy: false
                          proxyType: null
                          implementations: []
                    - address: "0x751D7C0Cf91a9b7704541b44E5fF7BeC3D2caA6F"
                      chainIds:
                        - chainId: "5"
                          status: "partial"
                          isProxy: true
                          proxyType: "EIP1967Proxy"
                          implementations:
                            [
                              {
                                address: "0x787ec93dd71a90563979417879f5a3298389227f",
                                name: "LogicContract",
                              },
                            ]
                        - chainId: "10"
                          status: "perfect"
                          isProxy: true
                          proxyType: "EIP1967Proxy"
                          implementations:
                            [
                              {
                                address: "0x787ec93dd71a90563979417879f5a3298389227f",
                                name: "LogicContract",
                              },
                            ]
                    - address: "0x8D2548A5f641b00Cf0f5B693d4A72D8c0aE24d31"
                      chainIds:
                        - chainId: "5"
                          status: "perfect"
                          isProxy: false
                          proxyType: null
                          implementations: []
                    - address: "0x1f9cA631AE0C4890F99b38634C969b7E4f8719F0"
                      status: "false"
                single result:
                  value:
                    - address: "0xEb30853fc616Bbb8f1444451A3c202cbcd08Fb47"
                      chainIds:
                        - chainId: "43114"
                          status: "perfect"
                          warning: "DEPRECATED: This endpoint will be removed. Do not build new integrations against it. Use GET /v2/contract/{chain}/{address} for each address+chain combination instead. Full API docs: https://sourcify.dev/server/api-docs/swagger.json"
                not found:
                  value:
                    - address: "0x1f9cA631AE0C4890F99b38634C969b7E4f8719F0"
                      status: "false"
                      warning: "DEPRECATED: This endpoint will be removed. Do not build new integrations against it. Use GET /v2/contract/{chain}/{address} for each address+chain combination instead. Full API docs: https://sourcify.dev/server/api-docs/swagger.json"
                    - address: "0x8D2548A5f641b00Cf0f5B693d4A72D8c0aE24d31"
                      status: "false"
                      warning: "DEPRECATED: This endpoint will be removed. Do not build new integrations against it. Use GET /v2/contract/{chain}/{address} for each address+chain combination instead. Full API docs: https://sourcify.dev/server/api-docs/swagger.json"
                proxy resolution error:
                  value:
                    - address: "0xEb30853fc616Bbb8f1444451A3c202cbcd08Fb47"
                      chainIds:
                        - chainId: "43114"
                          status: "perfect"
                          proxyResolutionError: "Proxy resolution failed"
