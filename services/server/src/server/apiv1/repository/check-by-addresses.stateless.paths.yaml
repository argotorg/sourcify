openapi: "3.0.0"

paths:
  /check-by-addresses:
    get:
      deprecated: true
      summary: Check if contracts are verified (full match) by addresses and chain IDs
      description: Checks if contract with the desired chain and address is verified and in the repository. It will search only the perfect matches.
      tags:
        - (Deprecated) Repository
      parameters:
        - name: addresses
          in: query
          description: The addresses of the contracts.
          required: true
          schema:
            type: string
            format: comma-separated-addresses
        - name: chainIds
          in: query
          description: The IDs of the chains.
          required: true
          schema:
            type: string
            format: comma-separated-sourcify-chainIds
          allowReserved: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    address:
                      type: string
                      example: "0xEb30853fc616Bbb8f1444451A3c202cbcd08Fb47"
                    status:
                      type: string
                      example: "perfect"
                    chainIds:
                      type: array
                      items:
                        type: string
                      example: ["43114", "137"]
                    warning:
                      type: string
                      description: Deprecation warning. This endpoint will be removed. Use the v2 API instead.
                      example: "DEPRECATED: This endpoint will be removed. Do not build new integrations against it. Use GET /v2/contract/{chain}/{address} for each address+chain combination instead. Full API docs: https://sourcify.dev/server/api-docs/swagger.json"
