language: en-US
reviews:
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "services/database/migrations/**"
      instructions: "Check for backwards-compatible migrations. Flag destructive operations (DROP, DELETE, ALTER column type)."
    - path: "services/server/src/**"
      instructions: "Check for API backwards compatibility. Flag changes to v1 endpoints."
    - path: "packages/**"
      instructions: "Check that changes maintain the public API contract for dependent services."
chat:
  auto_reply: true
